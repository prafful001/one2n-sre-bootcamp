name: CI Pipeline
on:
  push:
    paths:
      - 'milestone-1-student-api/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd milestone-1-student-api
          make install

      - name: Run tests
        run: |
          cd milestone-1-student-api
          make test

      - name: Run linting
        run: |
          cd milestone-1-student-api
          make lint

      - name: Set image tag
        id: vars
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Docker login
        run: |
          docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Docker build and push
        run: |
          cd milestone-1-student-api
          docker build -t ${{ secrets.DOCKER_USERNAME }}/student-api:${{ steps.vars.outputs.IMAGE_TAG }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/student-api:${{ steps.vars.outputs.IMAGE_TAG }}

      - name: Update image tag in values.yaml
        run: |
          sed -i 's/tag: .*/tag: "${{ steps.vars.outputs.IMAGE_TAG }}"/' milestone-1-student-api/helm/student-api/values.yaml

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add milestone-1-student-api/helm/student-api/values.yaml
          git diff --staged --quiet || git commit -m "ci: update image tag to ${{ steps.vars.outputs.IMAGE_TAG }}"
          git push origin main
