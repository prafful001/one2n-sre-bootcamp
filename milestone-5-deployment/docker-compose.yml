version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: student_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  api1:
    image: prafful01/student-api:1.0.0
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/student_db
    depends_on:
      - db
    networks:
      - app-network

  api2:
    image: prafful01/student-api:1.0.0
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/student_db
    depends_on:
      - db
    networks:
      - app-network

  nginx:
    image: nginx:latest
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api1
      - api2
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge