apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: student-api
data:
  DATABASE_URL: postgresql://postgres:postgres@postgres-service:5432/student_db
  FLASK_APP: run.py
  FLASK_ENV: development
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-external-secret
  namespace: student-api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
  - secretKey: db_password
    remoteRef:
      key: secret/student-api
      property: db_password
  - secretKey: secret_key
    remoteRef:
      key: secret/student-api
      property: secret_key
  - secretKey: db_url
    remoteRef:
      key: secret/student-api
      property: db_url
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-api
  namespace: student-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-api
  template:
    metadata:
      labels:
        app: student-api
    spec:
      nodeSelector:
        type: application
      containers:
      - name: api
        image: student-api:1.0.0
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: app-config
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: secret_key
---
apiVersion: v1
kind: Service
metadata:
  name: student-api-service
  namespace: student-api
spec:
  selector:
    app: student-api
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30081
  type: NodePort
