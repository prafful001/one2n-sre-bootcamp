apiVersion: v1
kind: Service
metadata:
  name: student-api-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: student-api
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    nodePort: {{ .Values.service.nodePort }}
  type: {{ .Values.service.type }}
